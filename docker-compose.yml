version: '3.8'

services:
  web:
    build: .
    container_name: crm-dashboard-web
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://crm_user:secret123@db:5432/crm_db
    depends_on:
      - db
    restart: always

  db:
    image: postgres:15-alpine
    container_name: crm-dashboard-db
    environment:
      - POSTGRES_USER=crm_user
      - POSTGRES_PASSWORD=secret123
      - POSTGRES_DB=crm_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    ports:
      - "5432:5432"

volumes:
  postgres_data:
