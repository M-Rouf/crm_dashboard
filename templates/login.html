<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Connexion | Dashboard CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body class="min-h-screen bg-slate-100 antialiased">
    <div class="flex min-h-screen items-center justify-center px-4">
      <div class="w-full max-w-md rounded-xl border border-slate-200 bg-white p-8 shadow-lg shadow-slate-900/5">
        <div class="mb-8 text-center">
          <img src="/img/logo_mrliw.png" alt="MRLIW" class="mx-auto h-10 w-auto" />
          <h1 class="mt-4 text-xl font-bold text-slate-900">Connexion CRM</h1>
          <p class="mt-1 text-sm text-slate-600">Identifiant et mot de passe de votre compte</p>
        </div>
        <form id="login-form" class="space-y-4">
          <div>
            <label for="email" class="block text-sm font-medium text-slate-700">Email</label>
            <input id="email" name="email" type="email" required autocomplete="username"
              class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:border-sky-500 focus:outline-none focus:ring-2 focus:ring-sky-500" />
          </div>
          <div>
            <label for="password" class="block text-sm font-medium text-slate-700">Mot de passe</label>
            <input id="password" name="password" type="password" required autocomplete="current-password"
              class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:border-sky-500 focus:outline-none focus:ring-2 focus:ring-sky-500" />
          </div>
          <p id="login-error" class="hidden rounded-lg border border-red-200 bg-red-50 px-3 py-2 text-sm text-red-700"></p>
          <button type="submit"
            class="w-full rounded-lg bg-sky-600 px-4 py-2.5 text-sm font-semibold text-white hover:bg-sky-700 focus:outline-none focus:ring-2 focus:ring-sky-500 focus:ring-offset-2">
            Se connecter
          </button>
        </form>
      </div>
    </div>
    <script>
      document.getElementById("login-form").addEventListener("submit", async (e) => {
        e.preventDefault();
        const err = document.getElementById("login-error");
        err.classList.add("hidden");
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        try {
          const res = await fetch("/api/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password }),
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok) throw new Error(data.detail || "Connexion impossible.");
          window.location.href = data.redirect || "/dashboard";
        } catch (ex) {
          err.textContent = ex.message || "Connexion impossible.";
          err.classList.remove("hidden");
        }
      });
    </script>
  </body>
</html>
